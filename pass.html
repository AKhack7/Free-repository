<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureVault — Password Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:     #080c14;
    --bg-card:     #0e1420;
    --bg-card2:    #121926;
    --bg-hover:    #1a2335;
    --border:      #1e2d45;
    --accent:      #2563eb;
    --accent2:     #3b82f6;
    --accent-glow: rgba(37,99,235,0.25);
    --accent-soft: rgba(59,130,246,0.12);
    --text-main:   #e8f0fe;
    --text-muted:  #6b8aad;
    --text-dim:    #3d5a7a;
    --success:     #10b981;
    --danger:      #ef4444;
    --warning:     #f59e0b;
    --mono:        'JetBrains Mono', monospace;
    --head:        'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-deep);
    color: var(--text-main);
    font-family: var(--head);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── GRID BG ─────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ─── LOCK SCREEN ─────────────────────────── */
  #lockScreen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-deep);
    animation: fadeIn .4s ease;
  }
  #lockScreen::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(37,99,235,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .lock-box {
    position: relative; z-index: 1;
    width: min(420px, 92vw);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px 40px;
    box-shadow: 0 0 60px rgba(37,99,235,0.12), 0 32px 64px rgba(0,0,0,0.6);
    text-align: center;
    animation: slideUp .5s cubic-bezier(.16,1,.3,1);
  }

  .lock-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), #1d4ed8);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px var(--accent-glow);
    font-size: 28px;
    animation: pulse 3s ease-in-out infinite;
  }

  .lock-title {
    font-size: 26px; font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text-main), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .lock-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; font-weight: 400; }

  .input-wrap {
    position: relative; margin-bottom: 16px;
  }
  .input-wrap input {
    width: 100%;
    background: var(--bg-deep);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 48px 14px 16px;
    font-family: var(--mono);
    font-size: 15px; color: var(--text-main);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    letter-spacing: 2px;
  }
  .input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .input-wrap input.shake { animation: shake .4s; }
  .input-wrap .eye-btn {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 4px; border-radius: 4px;
    transition: color .2s;
  }
  .input-wrap .eye-btn:hover { color: var(--accent2); }

  .lock-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #1d4ed8);
    border: none; border-radius: 10px;
    padding: 14px; font-family: var(--head);
    font-size: 15px; font-weight: 700;
    color: #fff; cursor: pointer;
    transition: transform .15s, box-shadow .2s, opacity .2s;
    box-shadow: 0 4px 20px var(--accent-glow);
    letter-spacing: 0.5px;
  }
  .lock-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px var(--accent-glow); }
  .lock-btn:active { transform: translateY(0); }

  .lock-error {
    margin-top: 14px; font-size: 13px; font-weight: 600;
    color: var(--danger);
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
    border-radius: 8px; padding: 10px 14px;
    display: none; letter-spacing: 0.3px;
  }
  .lock-error.show { display: block; animation: fadeIn .3s; }

  /* ─── DASHBOARD ───────────────────────────── */
  #dashboard { display: none; min-height: 100vh; position: relative; z-index: 1; }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(8,12,20,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(16px, 4vw, 40px);
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 18px; font-weight: 800;
    letter-spacing: -0.3px;
  }
  .header-logo .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), #1d4ed8);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .header-right { display: flex; align-items: center; gap: 12px; }

  .stat-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent-soft);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 20px; padding: 5px 12px;
    font-size: 12px; font-weight: 600; color: var(--accent2);
  }

  .lock-out-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 14px;
    font-family: var(--head); font-size: 12px; font-weight: 600;
    color: var(--text-muted); cursor: pointer;
    transition: all .2s; display: flex; align-items: center; gap: 6px;
  }
  .lock-out-btn:hover { background: var(--bg-hover); color: var(--text-main); border-color: var(--accent); }

  /* Search */
  .search-bar {
    padding: clamp(16px, 3vw, 28px) clamp(16px, 4vw, 40px) 0;
  }
  .search-inner {
    position: relative; max-width: 560px;
  }
  .search-inner input {
    width: 100%;
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px 13px 44px;
    font-family: var(--head); font-size: 14px;
    color: var(--text-main); outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-inner input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-inner input::placeholder { color: var(--text-dim); }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); pointer-events: none; font-size: 16px;
  }

  /* Stats Strip */
  .stats-strip {
    display: flex; gap: 12px; flex-wrap: wrap;
    padding: clamp(14px, 2.5vw, 22px) clamp(16px, 4vw, 40px) 0;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
    min-width: 140px; flex: 1;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-card .s-icon {
    width: 38px; height: 38px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    flex-shrink: 0;
  }
  .stat-card .s-num { font-size: 22px; font-weight: 800; line-height: 1; }
  .stat-card .s-lbl { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-top: 2px; }

  /* Main content */
  .main { padding: clamp(16px, 3vw, 28px) clamp(16px, 4vw, 40px) 60px; }

  /* Category Section */
  .category-section {
    margin-bottom: 32px;
    animation: fadeInUp .4s ease both;
  }
  .cat-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .cat-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .cat-title {
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.3px;
  }
  .cat-count {
    margin-left: auto;
    font-size: 11px; font-weight: 600;
    color: var(--text-muted);
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 2px 9px;
  }

  /* Account Table */
  .acc-table {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .acc-row {
    display: grid;
    grid-template-columns: 2fr 2.2fr 2.2fr auto;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background .18s;
  }
  .acc-row:last-child { border-bottom: none; }
  .acc-row:hover { background: var(--bg-hover); }
  .acc-row.header-row {
    background: var(--bg-card2);
    padding: 10px 18px;
    cursor: default;
  }
  .acc-row.header-row:hover { background: var(--bg-card2); }

  .col-head {
    font-size: 10px; font-weight: 700;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.2px;
  }

  .acc-site a {
    color: var(--accent2); font-size: 13px; font-weight: 600;
    text-decoration: none; display: flex; align-items: center; gap: 5px;
    transition: color .2s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .acc-site a:hover { color: #93c5fd; }
  .acc-site a svg { flex-shrink: 0; }

  .field-cell {
    display: flex; align-items: center; gap: 8px; min-width: 0;
  }
  .field-val {
    font-family: var(--mono);
    font-size: 12.5px; color: var(--text-main);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; min-width: 0;
  }
  .field-val.masked { letter-spacing: 3px; color: var(--text-muted); }

  .icon-btn {
    background: none; border: 1px solid transparent;
    border-radius: 6px; padding: 5px 7px;
    cursor: pointer; color: var(--text-dim);
    transition: all .18s; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; line-height: 1;
  }
  .icon-btn:hover { background: var(--bg-hover); border-color: var(--border); color: var(--text-main); }
  .icon-btn.copied { color: var(--success); border-color: rgba(16,185,129,0.3); }
  .icon-btn.eye-active { color: var(--accent2); }

  .acc-num {
    font-size: 11px; font-weight: 600;
    color: var(--text-dim);
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px;
    text-align: center; white-space: nowrap;
  }

  /* Mobile adjustments */
  @media (max-width: 640px) {
    .acc-row {
      grid-template-columns: 1fr;
      gap: 8px; padding: 14px 14px;
    }
    .acc-row.header-row { display: none; }
    .field-cell { flex-wrap: wrap; }
    .acc-site a { font-size: 14px; font-weight: 700; }
    .col-head { display: none; }
    .acc-num { display: none; }

    .acc-row .acc-site::before { content: '🌐 Site'; display: block; font-size: 10px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .field-cell-wrap { display: flex; flex-direction: column; gap: 2px; }
    .field-label { font-size: 10px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  }

  @media (max-width: 480px) {
    .stats-strip { gap: 8px; }
    .stat-card { min-width: 100px; padding: 12px 14px; }
    .stat-card .s-num { font-size: 18px; }
  }

  /* ─── ANIMATIONS ──────────────────────────── */
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: translateY(0) } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(28px) } to { opacity: 1; transform: translateY(0) } }
  @keyframes pulse { 0%,100%{ box-shadow: 0 0 20px var(--accent-glow) } 50%{ box-shadow: 0 0 40px var(--accent-glow) } }
  @keyframes shake {
    0%,100%{ transform: translateX(0) }
    20%{ transform: translateX(-8px) }
    40%{ transform: translateX(8px) }
    60%{ transform: translateX(-6px) }
    80%{ transform: translateX(6px) }
  }

  /* Tooltip */
  .tip { position: relative; }
  .tip::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #1e2d45; color: var(--text-main);
    font-size: 11px; font-weight: 600;
    padding: 4px 8px; border-radius: 5px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity .15s;
    border: 1px solid var(--border);
  }
  .tip:hover::after { opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* Footer */
  .footer {
    text-align: center;
    font-size: 11px; color: var(--text-dim);
    padding: 0 20px 24px;
    letter-spacing: 0.5px;
  }
  .footer span { color: var(--accent2); }
</style>
</head>

// ═══════════ STATE ═══════════════════════════════════════════════════
let visiblePasswords = {}; // key: index
let copiedTimers = {};

// ═══════════ LOCK / UNLOCK ════════════════════════════════════════════
document.getElementById('lockInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryUnlock();
});

function tryUnlock() {
  const val = document.getElementById('lockInput').value;
  const errEl = document.getElementById('lockError');
  const inp = document.getElementById('lockInput');
  if (val === MASTER) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    buildDashboard();
  } else {
    errEl.classList.add('show');
    inp.classList.add('shake');
    inp.value = '';
    setTimeout(() => inp.classList.remove('shake'), 500);
  }
}

function lockVault() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('lockInput').value = '';
  document.getElementById('lockError').classList.remove('show');
  visiblePasswords = {};
}

function toggleLockEye() {
  const inp = document.getElementById('lockInput');
  const icon = document.getElementById('eyeIconLock');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// ═══════════ BUILD DASHBOARD ══════════════════════════════════════════
function buildDashboard() {
  // Total count
  document.getElementById('totalCount').textContent = ACCOUNTS.length;

  // Stats strip
  const cats = [...new Set(ACCOUNTS.map(a => a.cat))];
  const strip = document.getElementById('statsStrip');
  strip.innerHTML = '';
  const topCats = [
    {k:'google', label:'Google'},
    {k:'instagram', label:'Instagram'},
    {k:'github', label:'GitHub'},
    {k:'facebook', label:'Facebook'},
  ];
  const statsData = [
    { icon:'🔐', label:'Total Accounts', val: ACCOUNTS.length, bg:'rgba(37,99,235,0.15)', col:'#3b82f6' },
    { icon:'📁', label:'Categories', val: cats.length, bg:'rgba(168,85,247,0.15)', col:'#a855f7' },
    { icon:'🔵', label:'Google', val: ACCOUNTS.filter(a=>a.cat==='google').length, bg:'rgba(66,133,244,0.15)', col:'#4285f4' },
    { icon:'📸', label:'Instagram', val: ACCOUNTS.filter(a=>a.cat==='instagram').length, bg:'rgba(225,48,108,0.15)', col:'#e1306c' },
  ];
  statsData.forEach(s => {
    strip.innerHTML += `
      <div class="stat-card">
        <div class="s-icon" style="background:${s.bg};color:${s.col}">${s.icon}</div>
        <div><div class="s-num" style="color:${s.col}">${s.val}</div><div class="s-lbl">${s.label}</div></div>
      </div>`;
  });

  renderAccounts(ACCOUNTS);
}

function renderAccounts(data) {
  const container = document.getElementById('accountsContainer');
  container.innerHTML = '';
  if (!data.length) {
    container.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted);font-size:15px">🔍 No accounts found</div>';
    return;
  }

  // Group by category
  const groups = {};
  data.forEach((acc, globalIdx) => {
    if (!groups[acc.cat]) groups[acc.cat] = [];
    groups[acc.cat].push({ ...acc, globalIdx: ACCOUNTS.indexOf(acc) });
  });

  let delay = 0;
  Object.entries(groups).forEach(([cat, accs]) => {
    const style = CAT_STYLES[cat] || { icon:'🔑', bg:'rgba(100,100,100,0.1)', color:'#888' };

    const section = document.createElement('div');
    section.className = 'category-section';
    section.style.animationDelay = `${delay}ms`;
    delay += 60;

    const rows = accs.map((acc, i) => buildRow(acc, i)).join('');

    section.innerHTML = `
      <div class="cat-header">
        <div class="cat-icon" style="background:${style.bg};color:${style.color}">${style.icon}</div>
        <span class="cat-title" style="color:${style.color}">${accs[0].label.replace(/ \d+$/,'')}</span>
        <span class="cat-count">${accs.length} account${accs.length > 1 ? 's':''}</span>
      </div>
      <div class="acc-table">
        <div class="acc-row header-row">
          <span class="col-head">Website</span>
          <span class="col-head">Username</span>
          <span class="col-head">Password</span>
          <span class="col-head">#</span>
        </div>
        ${rows}
      </div>`;
    container.appendChild(section);
  });
}

function buildRow(acc, localNum) {
  const idx = acc.globalIdx;
  const isVisible = visiblePasswords[idx];
  const passDisplay = isVisible ? escHtml(acc.pass) : '••••••••••';
  const passCls = isVisible ? '' : 'masked';
  const eyeTip = isVisible ? 'Hide Password' : 'Show Password';
  const eyeIcon = isVisible
    ? `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    : `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;

  // Get domain for display
  let domain = acc.url;
  try { domain = new URL(acc.url).hostname.replace('www.',''); } catch(e) {}

  return `
    <div class="acc-row">
      <div class="acc-site">
        <a href="${acc.url}" target="_blank" rel="noopener">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          ${domain}
        </a>
      </div>
      <div class="field-cell">
        <span class="field-val" id="user-${idx}" title="${escHtml(acc.user)}">${escHtml(acc.user)}</span>
        <button class="icon-btn tip" data-tip="Copy Username" id="ucopy-${idx}" onclick="copyField('user-${idx}','ucopy-${idx}')">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
      <div class="field-cell">
        <span class="field-val ${passCls}" id="pass-${idx}" data-real="${escHtml(acc.pass)}" data-vis="${isVisible?1:0}">${passDisplay}</span>
        <button class="icon-btn tip ${isVisible?'eye-active':''}" data-tip="${eyeTip}" id="eye-${idx}" onclick="togglePass(${idx})">
          ${eyeIcon}
        </button>
        <button class="icon-btn tip" data-tip="Copy Password" id="pcopy-${idx}" onclick="copyPass(${idx})">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
      <div class="acc-num">${localNum + 1}</div>
    </div>`;
}

// ═══════════ PASSWORD TOGGLE ══════════════════════════════════════════
function togglePass(idx) {
  visiblePasswords[idx] = !visiblePasswords[idx];
  const el = document.getElementById(`pass-${idx}`);
  const eyeBtn = document.getElementById(`eye-${idx}`);
  const isVisible = visiblePasswords[idx];

  if (isVisible) {
    el.textContent = el.dataset.real;
    el.classList.remove('masked');
    eyeBtn.classList.add('eye-active');
    eyeBtn.setAttribute('data-tip','Hide Password');
    eyeBtn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  } else {
    el.textContent = '••••••••••';
    el.classList.add('masked');
    eyeBtn.classList.remove('eye-active');
    eyeBtn.setAttribute('data-tip','Show Password');
    eyeBtn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }
}

// ═══════════ COPY ══════════════════════════════════════════════════════
function copyField(fieldId, btnId) {
  const el = document.getElementById(fieldId);
  const text = el.textContent;
  navigator.clipboard.writeText(text).then(() => flashCopied(btnId));
}

function copyPass(idx) {
  const el = document.getElementById(`pass-${idx}`);
  const text = el.dataset.real;
  navigator.clipboard.writeText(text).then(() => flashCopied(`pcopy-${idx}`));
}

function flashCopied(btnId) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.classList.add('copied');
  btn.setAttribute('data-tip','Copied!');
  btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
  clearTimeout(copiedTimers[btnId]);
  copiedTimers[btnId] = setTimeout(() => {
    btn.classList.remove('copied');
    btn.setAttribute('data-tip', btnId.startsWith('u') ? 'Copy Username' : 'Copy Password');
    btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
  }, 2000);
}

// ═══════════ SEARCH ════════════════════════════════════════════════════
function searchAccounts() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) { renderAccounts(ACCOUNTS); return; }
  const filtered = ACCOUNTS.filter(a =>
    a.label.toLowerCase().includes(q) ||
    a.cat.toLowerCase().includes(q) ||
    a.user.toLowerCase().includes(q) ||
    a.url.toLowerCase().includes(q)
  );
  renderAccounts(filtered);
}

// ═══════════ UTILS ════════════════════════════════════════════════════
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Focus lock input on load
window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('lockInput').focus(), 300);
});
</script>
